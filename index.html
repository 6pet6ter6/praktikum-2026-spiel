<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Catcher</title>
    
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>

    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        background: radial-gradient(circle at center, #1a1528, #09070f);
        color: #f3f4f6;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
    }

    h1 {
        margin-bottom: 15px;
        font-size: 2.8rem;
        font-weight: 800;
        letter-spacing: 2px;
        color: #00f1fe;
        text-shadow: 0 0 15px rgba(83, 36, 255, 0.6);
        text-shadow:#00e1ff 0px 0px 10px, #ff0095 0px 0px 20px, #ff0000 0px 0px 30px;
    }

    #ui-container {
        width: 400px;
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        font-size: 1.1rem;
        background: rgba(255, 255, 255, 0.07);
        padding: 12px 25px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
    }

    .stat {
        font-weight: 500;
        color: #9ca3af;
    }

    .stat span {
        font-weight: bold;
        color: #00f2fe;
        margin-left: 5px;
    }

    #game-container {
        position: relative;
        width: 400px;
        height: 500px;
        background: #0d0e15;
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid #4f46e5;
        box-shadow: 0 0 25px rgba(79, 70, 229, 0.4);
    }

    canvas {
        color:blueviolet;
        display: block;
        position: absolute;
        top: 0;
        left: 0;
    }

    #game-over-screen {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(10, 7, 18, 0.95);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        backdrop-filter: blur(4px);
    }

    #game-over-screen h2 {
        color: #ff0000;
        font-size: 3rem;
        font-weight: 800;
        margin-bottom: 15px;
        text-shadow: 0 0 60px rgba(255, 0, 0, 0.6);
    }

    #game-over-screen p {
        font-size: 1.2rem;
        color: #ff0000;
        margin-bottom: 30px;
    }

    button {
        padding: 14px 35px;
        font-size: 1.1rem;
        font-weight: bold;
        color: #ff0000;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        border: SOLID 2px #7c3aed;
        border-radius: 30px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        transition: all 0.2s ease-in-out;
    }

    .ersteller {
        margin-bottom: 15px;
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 3px;
        color: #00f1fe;
        text-shadow: 0 0 15px rgba(83, 36, 255, 0.6);
        text-shadow:#00e1ff 0px 0px 10px, #ff0095 0px 0px 20px, #ff0000 0px 0px 30px;
    } 

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        background: linear-gradient(135deg, #ff7700, #00f2fe);
    }

    button:active {
        transform: translateY(1px);
    }

    #controls-info {
        margin-top: 20px;
        font-size: 0.85rem;
        color: #6b7280;
        letter-spacing: 0.5px;
    }
</style>
</head>
<body>

    <h1>Geld Fänger</h1>

    <div id="ui-container">
        <div class="stat">Punkte: <span id="score">0</span></div>
        <div class="stat">Leben: <span id="lives">3</span></div>
        <div class="stat">Highscore: <span id="highscore">0</span></div>
    </div>

    <div id="game-container">
      
        <div id="game-over-screen">
            <h2>GAME OVER</h2>
            <p>Deine Punkte: <span id="final-score">0</span></p>
            <button onclick="resetGame()">Nochmal spielen</button>
        </div>
    </div>

    <div id="controls-info">Steuerung: Pfeiltasten links und rechts</div>
    <div class="ersteller">Spiel erstellt von Nico</div>
    
    <script>
let score = 0;
let lives = 3;
let highscore = 0;
let isGameOver = false;

let objektX;
let objektY;
let objektGroesse = 30; 
let fallTempo = 4;

let gefahrX;
let gefahrY;
let gefahrTempo = 4;

let korbX;
let korbBreite = 60; 
let korbGeschwindigkeit = 6; 

function setup() {
  let canvas = createCanvas(392, 492); 
  canvas.parent('game-container');
  
  korbX = width / 2;
  
  highscore = localStorage.getItem('coinHighscore') || 0;
  document.getElementById('highscore').textContent = highscore;
  
  neuesObjekt();
  neueGefahr();
}

function draw() {
  clear(); 

  if (isGameOver) return;

  if (keyIsDown(LEFT_ARROW)) {
    korbX -= korbGeschwindigkeit; 
  }
  if (keyIsDown(RIGHT_ARROW)) {
    korbX += korbGeschwindigkeit; 
  }

  if (korbX < korbBreite / 2) korbX = korbBreite / 2;
  if (korbX > width - korbBreite / 2) korbX = width - korbBreite / 2;

  fill(0, 240, 255);
  noStroke();
  rectMode(CENTER);
  rect(korbX, height - 30, korbBreite, 20, 10); 

  objektY = objektY + fallTempo;
  
  fill(255, 215, 0);
  textSize(30);
  textAlign(CENTER, CENTER);
  text("🪙", objektX, objektY); 

  if (
    objektY >= height - 45 && objektY <= height - 15 &&
    objektX > korbX - korbBreite / 2 &&
    objektX < korbX + korbBreite / 2
  ) {
    score++;
    document.getElementById('score').textContent = score; 
    fallTempo += 0.3; 
    neuesObjekt();
  }

  if (objektY > height) {
    lives--;
    document.getElementById('lives').textContent = lives; 
    if (lives <= 0) {
      endGame();
    } else {
      neuesObjekt();
    }
  }

  gefahrY = gefahrY + gefahrTempo;
  text("💣", gefahrX, gefahrY);

  if (
    gefahrY >= height - 45 && gefahrY <= height - 15 &&
    gefahrX > korbX - korbBreite / 2 &&
    gefahrX < korbX + korbBreite / 2
  ) {
    lives--;
    document.getElementById('lives').textContent = lives;
    
    if (lives <= 0) {
      endGame();
    } else {
      neueGefahr();
    }
  }

  if (gefahrY > height) {
    neueGefahr();
  }
}


function neuesObjekt() {
  objektX = random(20, width - 20);
  objektY = 10; 
}

function neueGefahr() {
  gefahrX = random(20, width - 20);
  gefahrY = random(-1000, -400); 
}


function endGame() {
  isGameOver = true;
  if (score > highscore) {
    highscore = score;
    localStorage.setItem('coinHighscore', highscore);
    document.getElementById('highscore').textContent = highscore;
  }

  document.getElementById('final-score').textContent = score;
  document.getElementById('game-over-screen').style.display = 'flex';
}

function resetGame() {
  score = 0;
  lives = 3;
  fallTempo = 4;
  isGameOver = false;

  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('game-over-screen').style.display = 'none';

  neuesObjekt();
  neueGefahr();
  loop(); 
}
    </script>
</body>
</html>
